name: Seguridad - Escaneo de Laravel (SCA)

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  laravel-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el código del repositorio
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Instalar dependencias de Composer (para generar composer.lock y vendor)
        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Ejecutar OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        id: Scan
        with:
          project: "Laravel App"
          path: "."
          format: "HTML"
          out: "reports"
          args: >
            --exclude "node_modules/**"
            --exclude "storage/**"
            --exclude "tests/**"
            --exclude ".git/**"
            --exclude ".github/**"
            --exclude "public/**"
            --exclude "bootstrap/cache/**"

      - name: Subir reporte de vulnerabilidades
        uses: actions/upload-artifact@v4
        with:
          name: Reporte-Seguridad-Laravel
          path: reports
